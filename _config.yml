<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Artist Portfolio | Имя Фамилия</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #00ff88;
            --secondary-bg: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* Навигация */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 10%;
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo { font-weight: 700; font-size: 1.5rem; letter-spacing: 2px; }
        .nav-links { list-style: none; display: flex; }
        .nav-links li { margin-left: 30px; }
        .nav-links a { 
            text-decoration: none; 
            color: var(--text-color); 
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--accent-color); }

        /* Герой-секция */
        section { padding: 100px 10%; }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; color: #888; max-width: 600px; }

        /* Галерея */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .project-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: var(--secondary-bg);
            aspect-ratio: 16 / 9;
        }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .project-card:hover img {
            transform: scale(1.1);
        }

        .project-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .project-card:hover .project-info { opacity: 1; }

        /* Контакты */
        .contact { text-align: center; background: var(--secondary-bg); }
        .contact h2 { margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--accent-color);
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: transform 0.3s;
        }
        .btn:hover { transform: translateY(-5px); }

        footer { text-align: center; padding: 40px; font-size: 0.8rem; color: #444; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ARTCORE.3D</div>
        <ul class="nav-links">
            <li><a href="#work">Работы</a></li>
            <li><a href="#about">Обо мне</a></li>
            <li><a href="#contact">Контакты</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>3D Visual Artist</h1>
        <p>Создаю цифровые миры, персонажей и промышленный дизайн. Специализируюсь на Unreal Engine и Blender.</p>
    </section>

    <section id="work">
        <h2 style="font-size: 2.5rem;">Избранные проекты</h2>
        <div class="portfolio-grid">
            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=800" alt="3D Project">
                <div class="project-info">
                    <h3>Cyberpunk City</h3>
                    <p>Environment Design / Octane Render</p>
                </div>
            </div>
            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1633356122544-f134324a6cee?auto=format&fit=crop&w=800" alt="3D Project">
                <div class="project-info">
                    <h3>Abstract Shapes</h3>
                    <p>Motion Design / Cinema 4D</p>
                </div>
            </div>
            <div class="project-card">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800" alt="3D Project">
                <div class="project-info">
                    <h3>Future Tech</h3>
                    <p>Product Visualization / Blender</p>
                </div>
            </div>
        </div>
    </section>

    <section id="about" style="max-width: 800px; margin: 0 auto; text-align: center;">
        <h2>Обо мне</h2>
        <p style="margin-top: 20px; color: #aaa;">
            Более 5 лет в индустрии CGI. Помогаю брендам оживлять их идеи через качественную визуализацию. 
            Владею полным циклом Pipeline: от моделинга и риггинга до финального композитинга.
        </p>
    </section>

    <section id="contact" class="contact">
        <h2>Готовы начать проект?</h2>
        <a href="mailto:your@email.com" class="btn">Написать мне</a>
    </section>

    <footer>
        <p>&copy; 2026 3D Portfolio. Все права защищены.</p>
    </footer>

</body>
</html>
